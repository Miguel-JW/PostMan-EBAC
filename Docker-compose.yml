version: '3.8'

services:

  mysql:
    image: mysql:8.0
    container_name: mysql-nomes
    restart: always
    ports:
      - "3306:3306"           # host:container — acesso pelo localhost:3306
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: nomesdb
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
